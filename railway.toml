# QuestNet — Railway deployment config
# Docs: https://docs.railway.com/config-as-code/reference

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/index.cjs"

# Railway polls this path to confirm the container is healthy before routing traffic.
healthcheckPath = "/health"
healthcheckTimeout = 30

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ── Notes ───────────────────────────────────────────────────────────────────
# Railway injects $PORT at runtime (typically 8080). Do NOT set PORT in the
# Dockerfile or here — let Railway control it. server/index.ts reads
# process.env.PORT so it will bind to whatever Railway assigns.
#
# The only env var to set in the Railway dashboard is:
#   NODE_ENV = production
